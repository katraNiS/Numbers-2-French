<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learn the Numbers</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1>Learn French Numbers</h1>
        <p class="subtitle">Master the numbers from zéro to beyond</p>
        <div class="tabs">
            <button id="tab-num-to-french" class="tab active">Number → French</button>
            <button id="tab-french-to-num" class="tab">French → Number</button>
        </div>
        <div class="range-section">
            <label>Min</label>
            <input type="number" id="min-range" value="0">
            <span class="range-divider">—</span>
            <input type="number" id="max-range" value="999">
            <label>Max</label>
        </div>

        <div id="top-display">Press Generate!</div>
        <div id="bottom-display"></div>

        <div class="button-group">
            <button id="generate-btn">Generate</button>
            <button id="translate-btn">Translate</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
